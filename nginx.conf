server {
	listen 80 default_server;
	listen [::]:80 default_server;

	root /var/www/html;
	index index.html index.htm index.nginx-debian.html;
	server_name _;

	location / {
		try_files $uri $uri/ =404;
	}

	location ~ /\.git {
		deny all;
		return 404;
	}

	location ~* \.md$ {
		deny all;
		return 404;
	}
}

server {
	root /var/www/html;
	index index.html index.htm index.nginx-debian.html;
	server_name www.arnauserver.me arnauserver.me;

	location / {
		try_files $uri $uri/ =404;
	}

	location ~ /\.git {
		deny all;
		return 404;
	}

	location ~* \.md$ {
		deny all;
		return 404;
	}

	listen [::]:443 ssl ipv6only=on;
	listen 443 ssl;
	ssl_certificate /etc/letsencrypt/live/arnauserver.me/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/arnauserver.me/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
	if ($host = www.arnauserver.me) {
		return 301 https://$host$request_uri;
	}

	if ($host = arnauserver.me) {
		return 301 https://$host$request_uri;
	}

	listen 80;
	listen [::]:80;
	server_name www.arnauserver.me arnauserver.me;
	return 404;
}
